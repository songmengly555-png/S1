<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Checkout</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>


<body>


<div class="container mt-5">

    <h3 class="mb-4">Checkout</h3>

    <div class="row">


        <!-- BILLING FORM -->

        <div class="col-md-7">

            <div class="card mb-4">

                <div class="card-header">
                    Billing Information
                </div>

                <div class="card-body">

                    <form>

                        <div class="form-row">

                            <div class="form-group col-md-6">
                                <label>First Name</label>
                                <input type="text" class="form-control">
                            </div>

                            <div class="form-group col-md-6">
                                <label>Last Name</label>
                                <input type="text" class="form-control">
                            </div>

                        </div>


                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" class="form-control">
                        </div>


                        <div class="form-group">
                            <label>Phone</label>
                            <input type="text" class="form-control">
                        </div>


                        <div class="form-group">
                            <label>Address</label>
                            <input type="text" class="form-control">
                        </div>


                        <div class="form-row">

                            <div class="form-group col-md-4">
                                <label>City</label>
                                <input type="text" class="form-control">
                            </div>

                            <div class="form-group col-md-4">
                                <label>State</label>
                                <input type="text" class="form-control">
                            </div>

                            <div class="form-group col-md-4">
                                <label>Zip</label>
                                <input type="text" class="form-control">
                            </div>

                        </div>


                    </form>

                </div>

            </div>


            <!-- PAYMENT -->

            <div class="card">

                <div class="card-header">
                    Payment Method
                </div>

                <div class="card-body">

                    <div class="custom-control custom-radio mb-2">

                        <input type="radio" name="payment"
                               class="custom-control-input"
                               id="cod" checked>

                        <label class="custom-control-label" for="cod">
                            Cash on Delivery
                        </label>

                    </div>


                    <div class="custom-control custom-radio mb-2">

                        <input type="radio" name="payment"
                               class="custom-control-input"
                               id="aba">

                        <label class="custom-control-label" for="aba">
                            ABA Pay
                        </label>

                    </div>


                    <div class="custom-control custom-radio mb-2">

                        <input type="radio" name="payment"
                               class="custom-control-input"
                               id="card">

                        <label class="custom-control-label" for="card">
                            Credit / Debit Card
                        </label>

                    </div>


                </div>

            </div>

        </div>


        <!-- ORDER SUMMARY -->

        <div class="col-md-5">

            <div class="card">

                <div class="card-header">
                    Order Summary
                </div>


                <div class="card-body">


                    <!-- ITEM -->

                    <div class="d-flex justify-content-between mb-2">

                        <div>

                            <strong>Wireless Headphone</strong>

                            <br>

                            <small class="text-muted">
                                Qty: 1
                            </small>

                        </div>

                        <span>$80</span>

                    </div>


                    <div class="d-flex justify-content-between mb-2">

                        <div>

                            <strong>Bluetooth Speaker</strong>

                            <br>

                            <small class="text-muted">
                                Qty: 2
                            </small>

                        </div>

                        <span>$120</span>

                    </div>


                    <hr>


                    <div class="d-flex justify-content-between">

                        <span>Subtotal</span>
                        <strong>$200</strong>

                    </div>


                    <div class="d-flex justify-content-between">

                        <span>Shipping</span>
                        <strong>$10</strong>

                    </div>


                    <hr>


                    <div class="d-flex justify-content-between">

                        <h5>Total</h5>
                        <h5>$210</h5>

                    </div>


                    <button class="btn btn-dark btn-block mt-3">
                        Place Order
                    </button>


                    <a href="#" class="btn btn-outline-secondary btn-block">
                        Back to Cart
                    </a>


                </div>

            </div>

        </div>


    </div>

</div>


</body>
</html>
